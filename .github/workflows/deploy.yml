name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize prod deploys. Don't cancel an in-flight deploy when a new push
# arrives — let it finish to avoid mid-deploy state weirdness on Cloudflare.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy api + web to Cloudflare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Build core (its dist/ is consumed by api + web at deploy time via the
      # workspace exports — turbo handles the dependency graph). NEXT_PUBLIC_*
      # env vars must be set HERE — Next inlines them into the client bundle
      # at build time. The web `next build` runs again inside the OpenNext
      # build below (it can't reuse this output because OpenNext requires
      # standalone build mode); turbo caches the core output, which is what
      # actually matters for this step.
      - name: Build (turbo)
        run: pnpm build
        env:
          NEXT_PUBLIC_RELEASE: ${{ github.sha }}

      - name: Deploy api worker
        # Note: invoke wrangler via `exec` because `pnpm deploy` is a reserved
        # built-in pnpm command (file copy), not the npm script. Pass the
        # release id as a non-secret var so the @sentry/cloudflare wrapper
        # can tag server-side events with the same SHA the web bundle and
        # uploaded source maps are tagged with.
        run: pnpm --filter @sendwyrd/api exec wrangler deploy --var SENTRY_RELEASE:${{ github.sha }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Web requires the OpenNext-Cloudflare build step (separate from the
      # plain `next build` that pnpm build runs via turbo). OpenNext drives
      # its own `next build` in standalone mode and copies `.next/static`
      # into `.open-next/assets/_next/static` — that copied tree is what
      # actually ships to clients via the worker's static-asset binding.
      # Source maps + Sentry upload + strip happen AFTER this step, against
      # the `.open-next/assets` tree (the ground truth for what ships).
      #
      # Three env vars inline into the client bundle at this step:
      #   NEXT_PUBLIC_SENTRY_DSN — Sentry DSN for client-side error reporting
      #     (see packages/web/src/components/SentryInit.tsx). Public-by-design
      #     per Sentry contract; storing as a secret only keeps it out of git.
      #   NEXT_PUBLIC_RELEASE — git SHA, for source-map ↔ release matching.
      #   NEXT_PUBLIC_RELEASE_NUMBER — auto-incrementing deploy count (the
      #     GitHub Actions workflow run number). Display-friendly identifier
      #     for the dashboard "build" section.
      # All are inlined by Next at build time per NEXT_PUBLIC_* convention.
      - name: Build web for Cloudflare
        run: pnpm --filter @sendwyrd/web exec opennextjs-cloudflare build
        env:
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_RELEASE: ${{ github.sha }}
          NEXT_PUBLIC_RELEASE_NUMBER: ${{ github.run_number }}

      # Inject debug IDs into the shipped web bundles + upload source maps
      # to Sentry. `productionBrowserSourceMaps: true` in next.config.ts
      # makes Next emit the .map files; OpenNext copies them into
      # `.open-next/assets/_next/static`. We inject + upload there so the
      # debug IDs in shipped bundles match the maps Sentry will resolve
      # against.
      - name: Upload web source maps to Sentry
        run: |
          npx --package=@sentry/cli sentry-cli sourcemaps inject packages/web/.open-next/assets/_next/static
          npx --package=@sentry/cli sentry-cli sourcemaps upload \
            --org "$SENTRY_ORG" \
            --project "$SENTRY_PROJECT_WEB" \
            --release "$GITHUB_SHA" \
            packages/web/.open-next/assets/_next/static
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT_WEB: ${{ secrets.SENTRY_PROJECT_WEB }}

      # NON-NEGOTIABLE. Source maps shipped to clients = giving the world
      # an unminified codebase. Sentry already has them (uploaded above).
      # Delete every .map file from the deploy output BEFORE the worker
      # ships. This is the security-critical part.
      #
      # The cosmetic `//# sourceMappingURL=...` refs in the .js/.css are
      # *attempted* to be stripped (browsers will silently 404 if they
      # remain — devtools warnings only, no functional impact). We don't
      # gate the deploy on that; the .map deletion is the security gate.
      #
      # Operates on `.open-next/assets/_next/static` — the ground truth
      # for what the worker serves per `wrangler.jsonc` `assets.directory`.
      - name: Strip source maps from web build output
        run: |
          set -e
          ASSETS=packages/web/.open-next/assets/_next/static
          map_count=$(find "$ASSETS" -name '*.map' | wc -l)
          echo "Deleting ${map_count} .map files from ${ASSETS}"
          find "$ASSETS" -name '*.map' -delete
          # Cosmetic: try to strip sourceMappingURL refs from .js/.css so
          # browser devtools don't warn about missing maps. Best-effort;
          # any sed quirk on the runner is non-fatal.
          find "$ASSETS" \( -name '*.js' -o -name '*.css' \) -exec sed -i -E '/sourceMappingURL=/d' {} + 2>/dev/null || true
          # SECURITY GATE: no .map files may remain. Fail the deploy if any do.
          remaining=$(find "$ASSETS" -name '*.map' 2>/dev/null | wc -l)
          if [ "$remaining" -ne 0 ]; then
            echo "ERROR: ${remaining} .map files still present in ${ASSETS} after strip" >&2
            find "$ASSETS" -name '*.map' >&2
            exit 1
          fi
          echo "OK: 0 .map files in deploy artifact."

      - name: Deploy web worker
        run: pnpm --filter @sendwyrd/web exec opennextjs-cloudflare deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Safety net. If smoke fails, the workflow exits non-zero and the run
      # is marked broken in GitHub.
      - name: Smoke test (e2e against production)
        run: pnpm --filter @sendwyrd/core exec tsx scripts/e2e-smoke.ts
